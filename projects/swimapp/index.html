<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toronto Swim Dashboard</title>
    <meta name="description" content="Compare real-time open-water conditions with City of Toronto lane swim schedules.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <h1>Toronto Swim Dashboard</h1>
        <p class="subtitle">Real-time Lake Ontario conditions & local lane swim schedules</p>
    </header>

    <!-- Main wrapper used by app.js for high-level error boundaries -->
    <main id="app-container" class="dashboard-grid">
        
        <!-- Lake Ontario / Open Water Conditions -->
        <section class="swim-section" aria-labelledby="beaches-title">
            <h2 id="beaches-title">Lake Ontario Beaches</h2>
            <div id="beach-container" class="grid-layout">
                <!-- JavaScript will inject dynamic beach condition cards here -->
                <div class="loading-placeholder">Loading open-water conditions...</div>
            </div>
        </section>

        <!-- City of Toronto Lane Swims -->
        <section class="swim-section" aria-labelledby="pools-title">
            <h2 id="pools-title">City Drop-in Lane Swims</h2>
            <div class="view-toggle-container">
                <button id="btn-today" class="toggle-btn active">Today</button>
                <button id="btn-week" class="toggle-btn">Full Week</button>
            </div>
            <div id="pool-cards-container" class="cards-container">
                <!-- JavaScript will inject dynamic pool schedule cards here -->
                <div class="loading-placeholder">Loading pool schedules...</div>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
