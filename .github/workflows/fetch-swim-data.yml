name: Daily Swim Schedule Fetcher

on:
  schedule:
    # Runs automatically at 8:00 AM UTC (4:00 AM Toronto time) every day
    - cron: '0 8 * * *'
  workflow_dispatch: 
    # This allows you to manually trigger it via a button on the GitHub website if you ever want to

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run the fetch script
        run: node update.js

      - name: Commit and push the new data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add swim-data.json
          git commit -m "Automated daily swim schedule update" || echo "No changes to commit"
          git push